name: Update Last Update Date

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  update-last-update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update Last Update date
        run: node scripts/update-last-update.mjs

      - name: Commit updated date
        run: |
          if git diff --quiet -- _pages/about.md; then
            echo "Last Update date is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _pages/about.md
          git commit -m "Update Last Update date [skip ci]"
          git push
